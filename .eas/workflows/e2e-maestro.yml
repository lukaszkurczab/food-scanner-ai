name: E2E Maestro

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - "src/**"
      - "e2e/**"
      - "app.config.js"
      - "eas.json"
      - "package.json"

jobs:
  build_android_e2e:
    name: Build Android (E2E)
    type: build
    params:
      platform: android
      profile: e2e-test

  maestro_android:
    name: Run Maestro Flows (Android)
    needs: [build_android_e2e]
    type: maestro
    runs_on: linux-medium-nested-virtualization
    params:
      build_id: ${{ needs.build_android_e2e.outputs.build_id }}
      flow_path:
        - e2e/maestro/login.yaml
        - e2e/maestro/add-meal.yaml
        - e2e/maestro/chat-ai.yaml
        - e2e/maestro/offline-error.yaml
