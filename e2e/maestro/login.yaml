appId: com.lkurczab.foodscannerai
env:
  E2E_EMAIL: e2e@example.com
  E2E_PASSWORD: password123
---
- launchApp:
    clearState: true
- openLink: caloriai://e2e/reset?logout=1
- tapOn:
    id: login-email-input
- eraseText
- inputText: ${E2E_EMAIL}
- tapOn:
    id: login-password-input
- eraseText
- inputText: ${E2E_PASSWORD}
- tapOn:
    id: login-submit-button
- assertVisible:
    id: tab-home
