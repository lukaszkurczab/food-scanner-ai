appId: com.lkurczab.fitaly
env:
  E2E_CONFLICT_USERNAME: e2e-user
  E2E_REGISTER_EMAIL: e2e-conflict@example.com
  E2E_REGISTER_PASSWORD: password123
---
- launchApp
- openLink: fitaly://e2e/reset?logout=1
- assertVisible:
    id: login-email-input
- tapOn:
    id: login-register-link

- assertVisible:
    id: register-username-input
- tapOn:
    id: register-username-input
- eraseText
- inputText: ${E2E_CONFLICT_USERNAME}
- tapOn:
    id: register-email-input
- eraseText
- inputText: ${E2E_REGISTER_EMAIL}
- tapOn:
    id: register-password-input
- eraseText
- inputText: ${E2E_REGISTER_PASSWORD}
- tapOn:
    id: register-confirm-password-input
- eraseText
- inputText: ${E2E_REGISTER_PASSWORD}
- tapOn:
    id: register-terms-checkbox
- tapOn:
    id: register-submit-button

- assertVisible: "This username is already taken"
- assertVisible:
    id: register-username-input
