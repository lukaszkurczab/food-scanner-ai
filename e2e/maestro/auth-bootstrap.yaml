appId: com.lkurczab.fitaly
env:
  E2E_EMAIL: e2e@example.com
  E2E_PASSWORD: password123
  E2E_ALT_EMAIL: e2e-alt@example.com
  E2E_ALT_PASSWORD: password123
---
- launchApp
- openLink: fitaly://e2e/reset?logout=1
- assertVisible:
    id: login-email-input

- runFlow: login.yaml
- assertVisible:
    id: tab-home

- tapOn:
    id: tab-profile
- scrollUntilVisible:
    element:
      id: account-logout-row
    direction: DOWN
- tapOn:
    id: account-logout-row
- assertVisible:
    id: login-email-input

- tapOn:
    id: login-email-input
- eraseText
- inputText: ${E2E_ALT_EMAIL}
- tapOn:
    id: login-password-input
- eraseText
- inputText: ${E2E_ALT_PASSWORD}
- tapOn:
    id: login-submit-button
- assertVisible:
    id: tab-home

- stopApp
- launchApp
- assertVisible:
    id: tab-home
