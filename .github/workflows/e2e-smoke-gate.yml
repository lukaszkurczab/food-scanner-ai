name: E2E Smoke Gate

on:
  workflow_dispatch:
    inputs:
      platform:
        description: "Target platform for Maestro smoke tests"
        required: true
        default: "ios"
        type: choice
        options:
          - ios
          - android

permissions:
  contents: read

jobs:
  smoke:
    name: Foundation + Account smoke
    runs-on: self-hosted
    timeout-minutes: 40

    env:
      E2E_PLATFORM: ${{ inputs.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run foundation smoke flow
        run: npm run e2e:foundation

      - name: Run account launch smoke flow
        run: bash scripts/run-e2e-local.sh e2e/maestro/account-launch-smoke.yaml
