name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  quality:
    name: Lint, Typecheck and Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare Firebase config fixtures for CI
        run: |
          cat <<'JSON' > google-services.json
          {
            "client": [
              {
                "client_info": {
                  "android_client_info": {
                    "package_name": "com.lkurczab.fitaly"
                  }
                }
              }
            ]
          }
          JSON
          cat <<'PLIST' > GoogleService-Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>BUNDLE_ID</key>
            <string>com.lkurczab.fitaly</string>
          </dict>
          </plist>
          PLIST

      - name: Validate launch readiness config (android)
        run: npm run check:launch-readiness:android
        env:
          TERMS_URL: https://example.com/terms
          PRIVACY_URL: https://example.com/privacy
          RC_ANDROID_API_KEY: ${{ secrets.RC_ANDROID_API_KEY }}

      - name: Validate launch readiness config (ios)
        run: npm run check:launch-readiness:ios
        env:
          TERMS_URL: https://example.com/terms
          PRIVACY_URL: https://example.com/privacy
          RC_IOS_API_KEY: ${{ secrets.RC_IOS_API_KEY }}

      - name: Run lint
        run: npm run lint

      - name: Run typecheck
        run: npm run typecheck

      - name: Security scan (npm audit)
        run: npm audit --omit=dev --audit-level=moderate

      - name: Run tests
        run: npm test

  contract-sync:
    name: Cross-repo contract sync
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout mobile repo
        uses: actions/checkout@v5

      - name: Checkout backend repo (canonical contract source)
        uses: actions/checkout@v5
        with:
          repository: ${{ github.repository_owner }}/fitaly-backend
          path: _backend

      - name: Verify contract sync
        run: BACKEND_REPO=_backend ./scripts/verify-backend-contract.sh
